<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pryt Voice</title>
  </head>
  <body>
    <div class="app">
      <header>
        <h1><span>Pryt</span> Voice</h1>
        <div id="whisper-status" class="whisper-status">Checking whisper.cpp...</div>
      </header>
      <div class="mic-select-wrapper">
        <label for="mic-select">Microphone:</label>
        <select id="mic-select">
          <option value="">Loading devices...</option>
        </select>
        <button id="refresh-mics" class="refresh-btn" title="Refresh device list">&#x21bb;</button>
      </div>
      <div id="transcript" class="transcript-area"></div>
      <div class="controls">
        <button id="record-btn" class="record-btn" title="Click to record (or press spacebar)" aria-keyshortcuts="Space"></button>
        <div id="status" class="status">Initializing...</div>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
